name: Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Unit tests — fast, no network, no optional deps
  # --------------------------------------------------------------------------
  unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run unit tests
        run: nox -s tests_unit -- -q

  # --------------------------------------------------------------------------
  # Integration tests — real EventProcessor, starts subprocesses
  # --------------------------------------------------------------------------
  integration:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run integration tests
        run: nox -s tests_integration -- -q

  # --------------------------------------------------------------------------
  # E2E tests — pyte PTY rendering + FastAPI test client, Python 3.12 only
  # --------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run e2e tests
        run: nox -s tests_e2e -- -q

  # --------------------------------------------------------------------------
  # Coverage — aggregate after unit + integration
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit, integration]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run coverage
        run: nox -s coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          flags: unittests
          name: agenthicc
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
