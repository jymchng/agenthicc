site_name: Agenthicc
site_description: >-
  A state-driven agent runtime for autonomous software engineering.
site_url: https://docs.agenthicc.dev
repo_url: https://github.com/agenthicc/agenthicc
repo_name: agenthicc/agenthicc
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
      - Quickstart: guides/quickstart.md
      - Architecture: guides/architecture.md
      - Configuration: guides/configuration.md
      - TUI: guides/tui.md
      - Workflows: guides/workflows.md
      - User-defined commands: guides/commands.md
      - User-defined tools: guides/tools.md
      - Extensions: guides/plugins.md
      - Memory: guides/memory.md
      - Security: guides/security.md
      - Testing: guides/testing.md
      - Historical hook status: guides/hooks.md
  - Reference:
      - CLI: reference/cli.md
      - Kernel: reference/kernel.md
      - Storage: reference/storage.md
      - Reference index: reference/index.md
      - API status: reference/api.md
      - Workflow review: reference/workflow-review.md
  - Compatibility:
      - TUI architecture pointer: tui-architecture.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/agenthicc/agenthicc

copyright: Copyright &copy; 2026 Agenthicc Contributors — MIT License
